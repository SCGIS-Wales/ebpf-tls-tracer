# Quick-start manifest for deploying tls-tracer WITHOUT Helm.
#
# Use this for:
#   - Quick evaluation on kind/minikube/k3s clusters
#   - CI/CD pipelines that don't have Helm installed
#   - Environments where Helm is not permitted
#
# For production deployments, use the Helm chart instead:
#   helm install tls-tracer ./helm/tls-tracer -n tls-tracer --create-namespace
#
# The Helm chart provides: S3/Kinesis log shipping, IRSA integration,
# configurable sanitization patterns, PodDisruptionBudget, and templated
# resource names with company prefix support.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tls-tracer
  namespace: tls-tracer
  labels:
    app: tls-tracer
spec:
  # R4 fix: explicit updateStrategy for production control
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app: tls-tracer
  template:
    metadata:
      labels:
        app: tls-tracer
    spec:
      serviceAccountName: tls-tracer
      hostPID: true
      hostNetwork: true
      containers:
        - name: tls-tracer
          image: ghcr.io/scgis-wales/ebpf-tls-tracer:latest
          args: ["-f", "json", "-v"]
          securityContext:
            # H-2: privileged:true required for eBPF bpf() syscall and probe attachment.
            # seccompProfile is not set because privileged:true overrides seccomp.
            privileged: true
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: run-dir
              mountPath: /var/run/tls-tracer
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: sys-kernel-tracing
              mountPath: /sys/kernel/tracing
              readOnly: true
            - name: sys-fs-bpf
              mountPath: /sys/fs/bpf
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: usr-src
              mountPath: /usr/src
              readOnly: true
            - name: host-ssl
              mountPath: /host/usr/lib64
              readOnly: true
            - name: host-ssl-x86
              mountPath: /host/usr/lib/x86_64-linux-gnu
              readOnly: true
            - name: host-ssl-arm64
              mountPath: /host/usr/lib/aarch64-linux-gnu
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      tolerations:
        - operator: Exists
      volumes:
        - name: run-dir
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
        - name: sys-kernel-tracing
          hostPath:
            path: /sys/kernel/tracing
        - name: sys-fs-bpf
          hostPath:
            path: /sys/fs/bpf
        - name: proc
          hostPath:
            path: /proc
        - name: lib-modules
          hostPath:
            path: /lib/modules
        - name: usr-src
          hostPath:
            path: /usr/src
        - name: host-ssl
          hostPath:
            path: /usr/lib64
            type: DirectoryOrCreate
        - name: host-ssl-x86
          hostPath:
            path: /usr/lib/x86_64-linux-gnu
            type: DirectoryOrCreate
        - name: host-ssl-arm64
          hostPath:
            path: /usr/lib/aarch64-linux-gnu
            type: DirectoryOrCreate
