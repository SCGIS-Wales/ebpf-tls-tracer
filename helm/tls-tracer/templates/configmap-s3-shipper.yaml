{{- if .Values.s3.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tls-tracer.fullname" . }}-s3-shipper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tls-tracer.labels" . | nindent 4 }}
data:
  s3_shipper.py: |
    #!/usr/bin/env python3
    """S3 log shipper for TLS Tracer.

    Reads JSON log lines from stdin (piped from tls_tracer) and ships them
    to S3 using Apache Hive-style directory partitioning.

    Path format:
      s3://<bucket>/<prefix>/account=<id>/region=<region>/cluster=<name>/
        namespace=<ns>/app=<app>/env=<env>/year=YYYY/month=MM/day=DD/
        hour=HH/<node>-<timestamp>.json

    Uses IRSA for authentication (no explicit credentials needed).
    """

    import os
    import sys
    import json
    import time
    import signal
    from datetime import datetime, timezone

    import boto3

    BUCKET = os.environ.get("S3_BUCKET", "")
    PREFIX = os.environ.get("S3_PREFIX", "tls-tracer-logs")
    FLUSH_INTERVAL = int(os.environ.get("FLUSH_INTERVAL", "60"))
    BATCH_SIZE = int(os.environ.get("BATCH_SIZE", "1000"))
    AWS_REGION = os.environ.get("AWS_REGION", "eu-west-1")
    ACCOUNT_ID = os.environ.get("AWS_ACCOUNT_ID", "unknown")
    CLUSTER = os.environ.get("CLUSTER_NAME", "unknown")
    NAMESPACE = os.environ.get("TARGET_NAMESPACE", "unknown")
    APP_NAME = os.environ.get("APP_NAME", "unknown")
    ENVIRONMENT = os.environ.get("ENVIRONMENT", "unknown")
    NODE_NAME = os.environ.get("NODE_NAME", "unknown")

    running = True


    def signal_handler(signum, frame):
        global running
        running = False


    signal.signal(signal.SIGTERM, signal_handler)
    signal.signal(signal.SIGINT, signal_handler)


    def build_s3_key(now):
        """Build Apache Hive-style S3 key."""
        parts = [
            PREFIX,
            f"account={ACCOUNT_ID}",
            f"region={AWS_REGION}",
            f"cluster={CLUSTER}",
            f"namespace={NAMESPACE}",
            f"app={APP_NAME}",
            f"env={ENVIRONMENT}",
            f"year={now.year:04d}",
            f"month={now.month:02d}",
            f"day={now.day:02d}",
            f"hour={now.hour:02d}",
            f"{NODE_NAME}-{now.strftime('%Y%m%dT%H%M%S')}.json",
        ]
        return "/".join(parts)


    def flush_batch(s3_client, batch):
        """Upload a batch of JSON lines to S3."""
        if not batch or not BUCKET:
            return
        now = datetime.now(timezone.utc)
        key = build_s3_key(now)
        body = "\n".join(batch) + "\n"
        try:
            s3_client.put_object(Bucket=BUCKET, Key=key, Body=body.encode("utf-8"),
                                ContentType="application/json")
            print(f"[s3-shipper] Uploaded {len(batch)} records to s3://{BUCKET}/{key}",
                  file=sys.stderr)
        except Exception as e:
            print(f"[s3-shipper] ERROR uploading to S3: {e}", file=sys.stderr)


    def main():
        if not BUCKET:
            print("[s3-shipper] ERROR: S3_BUCKET not set", file=sys.stderr)
            sys.exit(1)

        s3 = boto3.client("s3", region_name=AWS_REGION)
        batch = []
        last_flush = time.time()

        # Read from stdin (piped from tls_tracer via shared volume or stdout)
        log_file = "/var/log/tls-tracer/events.json"
        print(f"[s3-shipper] Watching {log_file} for JSON events", file=sys.stderr)

        while running:
            try:
                if os.path.exists(log_file):
                    with open(log_file, "r") as f:
                        for line in f:
                            line = line.strip()
                            if line:
                                batch.append(line)
                    # Truncate after reading
                    open(log_file, "w").close()
            except Exception as e:
                print(f"[s3-shipper] Read error: {e}", file=sys.stderr)

            now = time.time()
            if len(batch) >= BATCH_SIZE or (now - last_flush >= FLUSH_INTERVAL and batch):
                flush_batch(s3, batch)
                batch = []
                last_flush = now

            time.sleep(1)

        # Final flush
        if batch:
            flush_batch(s3, batch)


    if __name__ == "__main__":
        main()
{{- end }}
