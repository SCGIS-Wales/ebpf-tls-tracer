apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "tls-tracer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tls-tracer.labels" . | nindent 4 }}
spec:
  # R4 fix: explicit updateStrategy. OnDelete gives operators control over
  # when each node's eBPF probes are recycled (important for production).
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      {{- include "tls-tracer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tls-tracer.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tls-tracer.serviceAccountName" . }}
      hostPID: true
      hostNetwork: true
      # A6 fix: with hostNetwork: true, DNS defaults to node's resolv.conf.
      # ClusterFirstWithHostNet allows resolving both cluster DNS and host DNS.
      dnsPolicy: ClusterFirstWithHostNet
      # K-3 fix: give sidecars time to flush buffers on pod termination.
      # Default 30s may be insufficient for S3/Kinesis batch uploads.
      terminationGracePeriodSeconds: 60
      containers:
        - name: tls-tracer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or .Values.s3.enabled .Values.kinesis.enabled }}
          command: ["sh", "-c"]
          args:
            # R3/R7 fix: use tee -a (append) and trap SIGPIPE to prevent
            # silent termination if the log pipe breaks. Also ignore SIGPIPE
            # so the tracer continues even if tee dies.
            - >-
              trap '' PIPE;
              set -o pipefail;
              ./tls_tracer -f {{ .Values.outputFormat }}
              {{- if .Values.verbose }} -v{{- end }}
              {{- if .Values.filterPid }} -p {{ .Values.filterPid }}{{- end }}
              {{- if .Values.filterUid }} -u {{ .Values.filterUid }}{{- end }}
              {{- if .Values.sslLibPath }} -l {{ .Values.sslLibPath }}{{- end }}
              {{- range .Values.sanitizePatterns }} -s '{{ . }}'{{- end }}
              {{- range .Values.filters.net }} --net '{{ . }}'{{- end }}
              {{- range .Values.filters.proto }} --proto '{{ . }}'{{- end }}
              {{- range .Values.filters.method }} --method '{{ . }}'{{- end }}
              {{- range .Values.filters.dir }} --dir '{{ . }}'{{- end }}
              | tee -a /var/log/tls-tracer/events.json
          {{- else }}
          args:
            - "-f"
            - "{{ .Values.outputFormat }}"
            {{- if .Values.verbose }}
            - "-v"
            {{- end }}
            {{- if .Values.filterPid }}
            - "-p"
            - "{{ .Values.filterPid }}"
            {{- end }}
            {{- if .Values.filterUid }}
            - "-u"
            - "{{ .Values.filterUid }}"
            {{- end }}
            {{- if .Values.sslLibPath }}
            - "-l"
            - "{{ .Values.sslLibPath }}"
            {{- end }}
            {{- range .Values.sanitizePatterns }}
            - "-s"
            - {{ . | quote }}
            {{- end }}
            {{- range .Values.filters.net }}
            - "--net"
            - {{ . | quote }}
            {{- end }}
            {{- range .Values.filters.proto }}
            - "--proto"
            - {{ . | quote }}
            {{- end }}
            {{- range .Values.filters.method }}
            - "--method"
            - {{ . | quote }}
            {{- end }}
            {{- range .Values.filters.dir }}
            - "--dir"
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            # S6 fix: privileged: true is REQUIRED for eBPF program loading (bpf() syscall),
            # uprobe/kprobe attachment, and accessing /sys/kernel/debug.
            # There is no way to run eBPF tracing with reduced capabilities.
            # readOnlyRootFilesystem prevents runtime modification of the container.
            # runAsNonRoot cannot be set because eBPF requires root (CAP_BPF+CAP_PERFMON+CAP_SYS_ADMIN).
            # H-2 fix: seccompProfile is not set because privileged:true overrides it.
            # This is documented for audit compliance — privileged containers bypass seccomp.
            privileged: true
            readOnlyRootFilesystem: true
          readinessProbe:
            exec:
              command: ["test", "-f", "/var/run/tls-tracer/healthy"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              # R5 fix: check health file modification time is within 30s.
              # The tracer updates the health file every ~10s. If the file
              # exists but is stale (>30s old), the event loop may be hung.
              command:
                - sh
                - -c
                - >-
                  test -f /var/run/tls-tracer/healthy &&
                  [ "$(( $(date +%s) - $(stat -c %Y /var/run/tls-tracer/healthy) ))" -lt 30 ]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: run-dir
              mountPath: /var/run/tls-tracer
            - name: debugfs
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: tracefs
              mountPath: /sys/kernel/tracing
              readOnly: true
            - name: bpffs
              mountPath: /sys/fs/bpf
            - name: host-ssl
              mountPath: /host/usr/lib64
              readOnly: true
            - name: host-ssl-x86
              mountPath: /host/usr/lib/x86_64-linux-gnu
              readOnly: true
            - name: host-ssl-arm64
              mountPath: /host/usr/lib/aarch64-linux-gnu
              readOnly: true
            {{- if or .Values.s3.enabled .Values.kinesis.enabled }}
            - name: log-pipe
              mountPath: /var/log/tls-tracer
            {{- end }}
        {{- if .Values.s3.enabled }}
        - name: s3-shipper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "/opt/tls_tracer/scripts/s3_shipper.py"]
          env:
            {{- if .Values.s3.roleArn }}
            - name: AWS_ROLE_ARN
              value: {{ .Values.s3.roleArn | quote }}
            {{- end }}
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: S3_PREFIX
              value: {{ .Values.s3.prefix | quote }}
            - name: FLUSH_INTERVAL
              value: {{ .Values.s3.flushIntervalSeconds | quote }}
            - name: BATCH_SIZE
              value: {{ .Values.s3.batchSize | quote }}
            - name: AWS_REGION
              value: {{ default .Values.metadata.awsRegion "" | quote }}
            - name: AWS_ACCOUNT_ID
              value: {{ .Values.metadata.awsAccountId | quote }}
            - name: CLUSTER_NAME
              value: {{ .Values.metadata.clusterName | quote }}
            - name: TARGET_NAMESPACE
              value: {{ .Values.metadata.targetNamespace | quote }}
            - name: APP_NAME
              value: {{ .Values.metadata.applicationName | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.metadata.environment | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.s3.resources | nindent 12 }}
          volumeMounts:
            - name: log-pipe
              mountPath: /var/log/tls-tracer
        {{- end }}
        {{- if .Values.kinesis.enabled }}
        - name: kinesis-shipper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "/opt/tls_tracer/scripts/kinesis_shipper.py"]
          env:
            {{- if .Values.kinesis.roleArn }}
            - name: AWS_ROLE_ARN
              value: {{ .Values.kinesis.roleArn | quote }}
            {{- end }}
            - name: DELIVERY_STREAM
              value: {{ .Values.kinesis.deliveryStreamName | quote }}
            - name: AWS_REGION
              # C6 fix: prefer kinesis.region, fall back to metadata.awsRegion
              value: {{ .Values.kinesis.region | default .Values.metadata.awsRegion | quote }}
            - name: FLUSH_INTERVAL
              value: {{ .Values.kinesis.flushIntervalSeconds | quote }}
            - name: BATCH_SIZE
              value: {{ .Values.kinesis.batchSize | quote }}
            - name: CLUSTER_NAME
              value: {{ .Values.metadata.clusterName | quote }}
            - name: TARGET_NAMESPACE
              value: {{ .Values.metadata.targetNamespace | quote }}
            - name: APP_NAME
              value: {{ .Values.metadata.applicationName | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.metadata.environment | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.kinesis.resources | nindent 12 }}
          volumeMounts:
            - name: log-pipe
              mountPath: /var/log/tls-tracer
        {{- end }}
      volumes:
        - name: run-dir
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        # K-2 fix: kernel filesystem paths must already exist on the host.
        # Using Directory (not DirectoryOrCreate) fails fast on misconfigured nodes
        # instead of silently creating empty directories for kernel filesystems.
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: Directory
        - name: tracefs
          hostPath:
            path: /sys/kernel/tracing
            type: Directory
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: host-ssl
          hostPath:
            path: /usr/lib64
            type: DirectoryOrCreate
        - name: host-ssl-x86
          hostPath:
            path: /usr/lib/x86_64-linux-gnu
            type: DirectoryOrCreate
        - name: host-ssl-arm64
          hostPath:
            path: /usr/lib/aarch64-linux-gnu
            type: DirectoryOrCreate
        {{- if or .Values.s3.enabled .Values.kinesis.enabled }}
        # R9 fix: reduced sizeLimit and log rotation handled by shippers.
        # The shipper tracks offsets and truncates after successful upload.
        - name: log-pipe
          emptyDir:
            sizeLimit: 256Mi
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
