apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "tls-tracer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tls-tracer.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "tls-tracer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tls-tracer.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tls-tracer.serviceAccountName" . }}
      hostPID: true
      hostNetwork: true
      containers:
        - name: tls-tracer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or .Values.s3.enabled .Values.kinesis.enabled }}
          command: ["sh", "-c"]
          args:
            - >-
              ./tls_tracer -f {{ .Values.outputFormat }}
              {{- if .Values.verbose }} -v{{- end }}
              {{- if .Values.filterPid }} -p {{ .Values.filterPid }}{{- end }}
              {{- if .Values.filterUid }} -u {{ .Values.filterUid }}{{- end }}
              {{- if .Values.sslLibPath }} -l {{ .Values.sslLibPath }}{{- end }}
              {{- range .Values.sanitizePatterns }} -s '{{ . }}'{{- end }}
              | tee /var/log/tls-tracer/events.json
          {{- else }}
          args:
            - "-f"
            - "{{ .Values.outputFormat }}"
            {{- if .Values.verbose }}
            - "-v"
            {{- end }}
            {{- if .Values.filterPid }}
            - "-p"
            - "{{ .Values.filterPid }}"
            {{- end }}
            {{- if .Values.filterUid }}
            - "-u"
            - "{{ .Values.filterUid }}"
            {{- end }}
            {{- if .Values.sslLibPath }}
            - "-l"
            - "{{ .Values.sslLibPath }}"
            {{- end }}
            {{- range .Values.sanitizePatterns }}
            - "-s"
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          securityContext:
            privileged: true
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/tls_tracer_healthy"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["test", "-f", "/tmp/tls_tracer_healthy"]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: debugfs
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: tracefs
              mountPath: /sys/kernel/tracing
              readOnly: true
            - name: bpffs
              mountPath: /sys/fs/bpf
            - name: host-ssl
              mountPath: /usr/lib64
              readOnly: true
            - name: host-ssl-x86
              mountPath: /usr/lib/x86_64-linux-gnu
              readOnly: true
            {{- if or .Values.s3.enabled .Values.kinesis.enabled }}
            - name: log-pipe
              mountPath: /var/log/tls-tracer
            {{- end }}
        {{- if .Values.s3.enabled }}
        - name: s3-shipper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "/opt/tls_tracer/scripts/s3_shipper.py"]
          env:
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: S3_PREFIX
              value: {{ .Values.s3.prefix | quote }}
            - name: FLUSH_INTERVAL
              value: {{ .Values.s3.flushIntervalSeconds | quote }}
            - name: BATCH_SIZE
              value: {{ .Values.s3.batchSize | quote }}
            - name: AWS_REGION
              value: {{ default .Values.metadata.awsRegion "" | quote }}
            - name: AWS_ACCOUNT_ID
              value: {{ .Values.metadata.awsAccountId | quote }}
            - name: CLUSTER_NAME
              value: {{ .Values.metadata.clusterName | quote }}
            - name: TARGET_NAMESPACE
              value: {{ .Values.metadata.targetNamespace | quote }}
            - name: APP_NAME
              value: {{ .Values.metadata.applicationName | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.metadata.environment | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml .Values.s3.resources | nindent 12 }}
          volumeMounts:
            - name: log-pipe
              mountPath: /var/log/tls-tracer
        {{- end }}
        {{- if .Values.kinesis.enabled }}
        - name: kinesis-shipper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "/opt/tls_tracer/scripts/kinesis_shipper.py"]
          env:
            - name: DELIVERY_STREAM
              value: {{ .Values.kinesis.deliveryStreamName | quote }}
            - name: AWS_REGION
              value: {{ default .Values.metadata.awsRegion (default "" .Values.kinesis.region) | quote }}
            - name: FLUSH_INTERVAL
              value: {{ .Values.kinesis.flushIntervalSeconds | quote }}
            - name: BATCH_SIZE
              value: {{ .Values.kinesis.batchSize | quote }}
            - name: CLUSTER_NAME
              value: {{ .Values.metadata.clusterName | quote }}
            - name: TARGET_NAMESPACE
              value: {{ .Values.metadata.targetNamespace | quote }}
            - name: APP_NAME
              value: {{ .Values.metadata.applicationName | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.metadata.environment | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml .Values.kinesis.resources | nindent 12 }}
          volumeMounts:
            - name: log-pipe
              mountPath: /var/log/tls-tracer
        {{- end }}
      volumes:
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: DirectoryOrCreate
        - name: tracefs
          hostPath:
            path: /sys/kernel/tracing
            type: DirectoryOrCreate
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: host-ssl
          hostPath:
            path: /usr/lib64
            type: DirectoryOrCreate
        - name: host-ssl-x86
          hostPath:
            path: /usr/lib/x86_64-linux-gnu
            type: DirectoryOrCreate
        {{- if or .Values.s3.enabled .Values.kinesis.enabled }}
        - name: log-pipe
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
