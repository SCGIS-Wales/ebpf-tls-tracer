name: Build, Test, and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            gcc \
            make \
            libbpf-dev \
            libelf-dev \
            zlib1g-dev \
            linux-libc-dev \
            libc6-dev

      - name: Build
        run: make all

      - name: Run unit tests
        run: make test

      - name: Verify build artifacts
        run: |
          test -f bin/tls_tracer && echo "tls_tracer binary OK"
          test -f bin/bpf_program.o && echo "BPF object OK"
          file bin/tls_tracer
          file bin/bpf_program.o

      - name: Smoke test (help output)
        run: ./bin/tls_tracer --help

      - name: Package release artifacts
        run: |
          mkdir -p release
          cp bin/tls_tracer release/
          cp bin/bpf_program.o release/
          cp README.md release/
          cp LICENSE release/
          ARCH=$(uname -m)
          cd release && tar czf ../tls_tracer-linux-${ARCH}.tar.gz *

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tls_tracer-linux-amd64
          path: tls_tracer-linux-*.tar.gz

  functional-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm gcc make libbpf-dev libelf-dev zlib1g-dev \
            linux-libc-dev libc6-dev openssl curl

      - name: Build
        run: make all

      - name: Verify kernel eBPF support
        run: |
          echo "=== Kernel version ==="
          uname -r
          echo "=== Architecture ==="
          uname -m
          echo "=== BPF filesystem ==="
          mount | grep bpf || echo "BPF filesystem not mounted (may be auto-mounted)"
          echo "=== BTF support ==="
          ls -la /sys/kernel/btf/vmlinux 2>/dev/null && echo "BTF OK" || echo "BTF not available"
          echo "=== eBPF JIT ==="
          cat /proc/sys/net/core/bpf_jit_enable 2>/dev/null || echo "Cannot read JIT setting"
          echo "=== Kernel config checks ==="
          for cfg in CONFIG_BPF CONFIG_BPF_SYSCALL CONFIG_BPF_JIT CONFIG_UPROBE_EVENTS CONFIG_KPROBE_EVENTS; do
            grep -q "${cfg}=y" /boot/config-$(uname -r) 2>/dev/null && echo "$cfg=y OK" || echo "$cfg not found in config (may be built-in)"
          done

      - name: Verify BPF object loads
        run: |
          file bin/bpf_program.o | grep -q "ELF" && echo "BPF object is valid ELF"
          llvm-objdump -h bin/bpf_program.o

      - name: Functional test - SSL library detection
        run: |
          SSL_LIB=$(find /usr/lib* /lib* -name 'libssl.so*' -not -type d 2>/dev/null | head -1)
          if [ -n "$SSL_LIB" ]; then
            echo "Found SSL library: $SSL_LIB"
            timeout 3 sudo ./bin/tls_tracer -l "$SSL_LIB" -v 2>&1 || true
          else
            echo "No SSL library found (expected on minimal CI images)"
          fi

      - name: Functional test - BPF program load and probe attach
        run: |
          cd bin
          timeout 5 sudo ./tls_tracer -v -f json 2>tracer_stderr.log &
          TRACER_PID=$!
          sleep 2

          if kill -0 $TRACER_PID 2>/dev/null; then
            echo "Tracer is running (PID=$TRACER_PID) - BPF loaded successfully"
            curl -s -o /dev/null https://www.google.com 2>/dev/null || true
            sleep 1
            sudo kill -SIGINT $TRACER_PID 2>/dev/null || true
            wait $TRACER_PID 2>/dev/null || true
            echo "=== Tracer stderr output ==="
            cat tracer_stderr.log
            echo "=== Test PASSED: BPF program loaded and probes attached ==="
          else
            echo "=== Tracer stderr output ==="
            cat tracer_stderr.log 2>/dev/null || true
            echo "=== Tracer exited early (may be expected if probes cannot attach in CI) ==="
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, functional-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t tls_tracer:test .

      - name: Smoke test container
        run: docker run --rm tls_tracer:test --help

  # ---------- Auto-tag on merge to main ----------

  auto-tag:
    name: Auto-tag release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build, functional-test, docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.create_tag.outputs.created }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT="1.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3 | cut -d- -f1)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEXT} (tag: v${NEXT})"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        id: create_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "::notice::Created tag $TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

  # ---------- GitHub Release ----------

  github-release:
    name: GitHub Release
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          name: tls_tracer-linux-amd64

      - name: Create checksums
        run: sha256sum tls_tracer-linux-*.tar.gz > checksums.txt

      - name: Delete existing draft releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.auto-tag.outputs.tag }}"
          gh api "repos/${{ github.repository }}/releases" --jq \
            ".[] | select(.tag_name==\"${TAG}\" and .draft==true) | .id" \
          | while read -r DRAFT_ID; do
            echo "Deleting draft release (id=${DRAFT_ID})..."
            gh api -X DELETE "repos/${{ github.repository }}/releases/${DRAFT_ID}"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.auto-tag.outputs.tag }}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, updating..."
            gh release edit "${TAG}" --latest
            gh release upload "${TAG}" --clobber tls_tracer-linux-*.tar.gz checksums.txt
          else
            echo "Creating new release ${TAG}..."
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              --latest \
              tls_tracer-linux-*.tar.gz checksums.txt
          fi

  # ---------- Publish Container to GHCR ----------

  publish-container:
    name: Publish Container
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag, docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.auto-tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.auto-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.auto-tag.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.auto-tag.outputs.tag }}
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
