name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            gcc \
            make \
            libbpf-dev \
            libelf-dev \
            zlib1g-dev \
            linux-libc-dev \
            libc6-dev

      - name: Build
        run: make all

      - name: Run unit tests
        run: make test

      - name: Verify build artifacts
        run: |
          test -f bin/tls_tracer && echo "tls_tracer binary OK"
          test -f bin/bpf_program.o && echo "BPF object OK"
          file bin/tls_tracer
          file bin/bpf_program.o

      - name: Smoke test (help output)
        run: ./bin/tls_tracer --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tls_tracer-linux-amd64
          path: |
            bin/tls_tracer
            bin/bpf_program.o

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tls_tracer:test .

      - name: Test Docker image
        run: docker run --rm tls_tracer:test --help
