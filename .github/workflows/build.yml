name: Build, Test, and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            gcc \
            make \
            libbpf-dev \
            libelf-dev \
            zlib1g-dev \
            linux-libc-dev \
            libc6-dev

      - name: Build
        run: make all

      - name: Run unit tests
        run: make test

      - name: Verify build artifacts
        run: |
          test -f bin/tls_tracer && echo "tls_tracer binary OK"
          test -f bin/bpf_program.o && echo "BPF object OK"
          file bin/tls_tracer
          file bin/bpf_program.o

      - name: Smoke test (help output)
        run: ./bin/tls_tracer --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tls_tracer-linux-amd64
          path: |
            bin/tls_tracer
            bin/bpf_program.o

  functional-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm gcc make libbpf-dev libelf-dev zlib1g-dev \
            linux-libc-dev libc6-dev openssl curl

      - name: Build
        run: make all

      - name: Verify kernel eBPF support
        run: |
          echo "=== Kernel version ==="
          uname -r
          echo "=== BPF filesystem ==="
          mount | grep bpf || echo "BPF filesystem not mounted (may be auto-mounted)"
          echo "=== BTF support ==="
          ls -la /sys/kernel/btf/vmlinux 2>/dev/null && echo "BTF OK" || echo "BTF not available"
          echo "=== eBPF JIT ==="
          cat /proc/sys/net/core/bpf_jit_enable 2>/dev/null || echo "Cannot read JIT setting"
          echo "=== Kernel config checks ==="
          for cfg in CONFIG_BPF CONFIG_BPF_SYSCALL CONFIG_BPF_JIT CONFIG_UPROBE_EVENTS CONFIG_KPROBE_EVENTS; do
            grep -q "${cfg}=y" /boot/config-$(uname -r) 2>/dev/null && echo "$cfg=y OK" || echo "$cfg not found in config (may be built-in)"
          done

      - name: Verify BPF object loads
        run: |
          # Verify the BPF object file is valid BPF bytecode
          file bin/bpf_program.o | grep -q "ELF" && echo "BPF object is valid ELF"
          # List BPF sections
          llvm-objdump -h bin/bpf_program.o

      - name: Functional test - SSL library detection
        run: |
          # Test that the tracer can find libssl
          SSL_LIB=$(find /usr/lib* /lib* -name 'libssl.so*' -not -type d 2>/dev/null | head -1)
          if [ -n "$SSL_LIB" ]; then
            echo "Found SSL library: $SSL_LIB"
            # Test that tracer accepts the library path
            timeout 3 sudo ./bin/tls_tracer -l "$SSL_LIB" -v 2>&1 || true
          else
            echo "No SSL library found (expected on minimal CI images)"
          fi

      - name: Functional test - BPF program load and probe attach
        run: |
          # Start tracer in background, capture stderr for status messages
          cd bin
          timeout 5 sudo ./tls_tracer -v -f json 2>tracer_stderr.log &
          TRACER_PID=$!

          # Give it time to load and attach probes
          sleep 2

          # Check if tracer is still running (means it loaded successfully)
          if kill -0 $TRACER_PID 2>/dev/null; then
            echo "Tracer is running (PID=$TRACER_PID) - BPF loaded successfully"

            # Generate some TLS traffic to test capture
            curl -s -o /dev/null https://www.google.com 2>/dev/null || true

            sleep 1

            # Gracefully stop
            sudo kill -SIGINT $TRACER_PID 2>/dev/null || true
            wait $TRACER_PID 2>/dev/null || true

            echo "=== Tracer stderr output ==="
            cat tracer_stderr.log
            echo "=== Test PASSED: BPF program loaded and probes attached ==="
          else
            echo "=== Tracer stderr output ==="
            cat tracer_stderr.log 2>/dev/null || true
            echo "=== Tracer exited early (may be expected if probes cannot attach in CI) ==="
          fi

  docker:
    runs-on: ubuntu-latest
    needs: [build, functional-test]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker build -t tls_tracer:test .
          docker run --rm tls_tracer:test --help
